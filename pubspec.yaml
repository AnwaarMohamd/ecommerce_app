name: ecommerce_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  cloud_firestore: ^6.3.0
  equatable: ^2.0.8
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_storage: ^13.1.0
  image_picker: ^0.8.7+5
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_screenutil: ^5.9.3
  gap: ^3.0.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: PPMori
      fonts:
      - asset: assets/fonts/PPMori-Regular.otf
        weight: 400
      - asset: assets/fonts/PPMori-SemiBold.otf
        weight: 600
